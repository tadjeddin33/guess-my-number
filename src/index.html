<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Guess My Number — A sleek number guessing game for your portfolio." />
  <title>Guess My Number</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Favicon: inline SVG as data URI -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%236c63ff' opacity='0.9'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3E%3F%3C/text%3E%3C/svg%3E" />
</head>
<body>

  <header>
    <div class="header-inner">
      <button class="btn again" aria-label="Restart game">↺ Again</button>
      <h1>Guess My Number</h1>
      <p class="subtitle">Pick a number between 1 and 20</p>
    </div>
  </header>

  <!-- Number bubble sits between header and main -->
  <div class="number-wrapper">
    <div class="number" aria-live="polite" aria-label="Secret number display">?</div>
  </div>

  <main>
    <!-- Input Panel -->
    <section class="panel glass" aria-label="Guess input">
      <input
        type="number"
        class="guess"
        placeholder="?"
        min="1"
        max="20"
        aria-label="Your guess"
      />
      <button class="btn check" aria-label="Check your guess">Check ↵</button>
      <p class="message" role="status" aria-live="polite">Start guessing…</p>
    </section>

    <!-- Stats Panel -->
    <section class="panel glass" aria-label="Game statistics">
      <div class="stats">
        <div class="stat-card score-card">
          <span class="stat-label">Score</span>
          <span class="stat-value score">20</span>
        </div>
        <div class="stat-card hi-card">
          <span class="stat-label">High Score</span>
          <span class="stat-value highscore">0</span>
        </div>
        <div class="stat-card streak-card">
          <span class="stat-label">Win Streak</span>
          <span class="stat-value streak">0</span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
